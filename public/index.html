<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>心臟方塊對戰</title><link rel="stylesheet" href="/style.css"></head><body>
<main><section id="join" class="card"><p class="eyebrow">第十二章｜心臟解剖生理學</p><h1>心臟方塊對戰</h1><p class="intro">消除一排，對手就要回答 3 題國考式題目。先完成題目，才能回到自己的方塊盤面。</p><label>暱稱<input id="name" maxlength="18" placeholder="例如：3A-小安"></label><label>房間代碼<input id="room" maxlength="8" autocapitalize="characters" placeholder="例如：HEART01"></label><button id="joinBtn">加入房間</button><p id="joinMsg" class="message"></p><p class="hint">兩位同學輸入相同代碼即可配對；每個房間限兩人。</p></section>
<section id="game" hidden><header><div><p class="eyebrow">房間 <span id="roomLabel"></span></p><h1>心臟方塊對戰</h1></div><div id="status" class="status">等待對手加入…</div></header><div class="play"><div class="board-wrap"><canvas id="board" width="300" height="600" aria-label="我的俄羅斯方塊盤面"></canvas><div id="toast" class="toast"></div></div><aside><div class="next"><span>下一個方塊</span><canvas id="next" width="120" height="120"></canvas></div><div class="stats"><span>消除列數</span><strong id="lines">0</strong></div><div class="rules"><b>對戰規則</b><p>每消除 1 排，對手就會收到 3 題單選題。答完才能繼續落下方塊。</p></div></aside></div><div class="controls" aria-label="遊戲控制"><button data-move="left">◀</button><button data-move="rotate">⟳</button><button data-move="right">▶</button><button data-move="down">▼</button></div></section>
</main><div id="quiz" class="modal" hidden><section class="quiz-card"><p class="eyebrow">對手消除了 <span id="triggerLines"></span> 排</p><h2>回答 3 題才能繼續</h2><div id="quizBody"></div><button id="nextQuestion" disabled>下一題</button></section></div><div id="result" class="modal" hidden><section class="quiz-card result"><h2 id="resultTitle"></h2><p id="resultText"></p><button id="resume">回到盤面</button></section></div><script src="/app.js"></script></body></html>
